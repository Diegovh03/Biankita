<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Dejame tu correo y te envio el enlace" />
<meta name="theme-color" content="#fffdf0" />
<meta name="robots" content="noindex, nofollow" />
<title>El Codigo del amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link href="css/gate.css" type="text/css" rel="stylesheet" />
</head>
<body class="gate-page">

<main class="gate-card">
	<span class="gate-card__heart" aria-hidden="true">♥</span>
	<h1 class="gate-card__title">Algo especial te espera</h1>
	<p class="gate-card__lead" id="accesoLead">Dejame tu correo y te envio el enlace para abrirlo.</p>

	<form id="accesoForm" class="gate-form">
		<label for="emails">Tu correo</label>
		<input
			type="text"
			id="emails"
			name="emails"
			placeholder="nombre@ejemplo.com"
			autocomplete="email"
			inputmode="email"
			required
		/>

		<button type="submit">Enviar enlace</button>
	</form>

	<p id="accesoStatus" class="gate-status" role="status"></p>
	<p class="gate-card__note" id="accesoBottomNote" hidden></p>
</main>

<script src="js/acceso.js"></script>
</body>
</html>
