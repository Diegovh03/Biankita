<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Tu carta te espera" />
<meta name="theme-color" content="#fffdf0" />
<meta name="robots" content="noindex, nofollow" />
<title>El Codigo del amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link href="css/gate.css" type="text/css" rel="stylesheet" />
</head>
<body class="gate-page">

<main class="gate-card">
	<span class="gate-card__heart" aria-hidden="true">♥</span>
	<h1 class="gate-card__title">Algo especial te espera</h1>
	<p class="gate-card__lead">Escribe tu correo y te mostramos como abrir tu carta en la laptop.</p>

	<form id="accesoForm" class="gate-form" action="enviado.html" method="GET">
		<label for="email">Tu correo</label>
		<input
			type="email"
			id="email"
			name="email"
			placeholder="nombre@ejemplo.com"
			autocomplete="email"
			inputmode="email"
			required
		/>

		<button type="submit">Continuar</button>
	</form>

	<p class="gate-card__note">La carta se ve mejor en computador o laptop.</p>
</main>

</body>
</html>
