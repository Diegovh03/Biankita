<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Enlace enviado</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link href="css/gate.css" type="text/css" rel="stylesheet" />
</head>
<body class="gate-page">

<main class="gate-card gate-card--success">
	<span class="gate-card__heart" aria-hidden="true">♥</span>
	<h1 class="gate-card__title">Listo</h1>
	<p class="gate-card__lead" id="enviadoLead">Te enviamos el enlace a tu correo.</p>
	<p class="gate-card__note" id="enviadoNote">Abrelo desde tu laptop cuando lo recibas. Revisa spam si no aparece en un minuto.</p>
</main>

<script>
(function () {
	var params = new URLSearchParams(window.location.search);
	var lead = document.getElementById("enviadoLead");
	var note = document.getElementById("enviadoNote");

	if (params.get("modo") === "borrador" && lead && note) {
		lead.textContent = "Casi listo — falta un paso.";
		note.textContent =
			"Se abrio tu app de correo con el enlace ya escrito. Pulsa Enviar alli. Luego abrelo desde tu laptop (revisa spam si no aparece).";
	}
})();
</script>

</body>
</html>
