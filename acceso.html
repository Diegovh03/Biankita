<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Dejame tu correo y te envio el enlace" />
<meta name="theme-color" content="#fffdf0" />
<meta name="robots" content="noindex, nofollow" />
<title>El Codigo del amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link href="css/gate.css" type="text/css" rel="stylesheet" />
</head>
<body class="gate-page">

<main class="gate-card">
	<span class="gate-card__heart" aria-hidden="true">♥</span>
	<h1 class="gate-card__title">Algo especial te espera</h1>
	<p class="gate-card__lead">Dejame tu correo y te envio el enlace para abrirlo.</p>

	<form
		id="accesoForm"
		class="gate-form"
		action="https://formsubmit.co/daaron.valdiviah@gmail.com"
		method="POST"
	>
		<label for="email">Tu correo</label>
		<input
			type="email"
			id="email"
			name="email"
			placeholder="nombre@ejemplo.com"
			autocomplete="email"
			inputmode="email"
			required
		/>

		<input type="hidden" name="_subject" value="Nuevo pedido de enlace — Biankita" />
		<input type="hidden" name="_captcha" value="false" />
		<input type="hidden" name="_template" value="table" />
		<input type="hidden" name="_next" value="https://diegovh03.github.io/Biankita/enviado.html" />
		<input type="hidden" name="_autoresponse" value="Hola,&#10;&#10;Te envio el enlace de tu carta:&#10;&#10;https://is.gd/OBRhL8&#10;&#10;Abrelo desde tu laptop para que se vea mejor.&#10;&#10;Con carino,&#10;Diego" />

		<button type="submit">Enviar enlace</button>
	</form>

	<p id="accesoStatus" class="gate-status" role="status"></p>
</main>

<script>
document.getElementById("accesoForm").addEventListener("submit", function () {
	var btn = this.querySelector("button");
	btn.disabled = true;
	btn.textContent = "Enviando…";
});
</script>

</body>
</html>
