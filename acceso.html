<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Dejame tu correo y te envio el enlace" />
<meta name="theme-color" content="#fffdf0" />
<meta name="robots" content="noindex, nofollow" />
<title>El Codigo del amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link href="css/gate.css" type="text/css" rel="stylesheet" />
</head>
<body class="gate-page">

<main class="gate-card">
	<span class="gate-card__heart" aria-hidden="true">♥</span>
	<h1 class="gate-card__title">Algo especial te espera</h1>
	<p class="gate-card__lead">Dejame tu correo y te envio el enlace para abrirlo en la laptop.</p>

	<form id="accesoForm" class="gate-form">
		<label for="email">Tu correo</label>
		<input
			type="email"
			id="email"
			name="email"
			placeholder="nombre@ejemplo.com"
			autocomplete="email"
			inputmode="email"
			required
		/>

		<button type="submit">Enviar enlace</button>
	</form>

	<p id="accesoStatus" class="gate-status" role="status"></p>
</main>

<script src="js/google-config.js"></script>
<script>
(function () {
	var ENVIADO_URL = "https://diegovh03.github.io/Biankita/enviado.html";
	var form = document.getElementById("accesoForm");
	var input = document.getElementById("email");
	var status = document.getElementById("accesoStatus");
	var url = window.GOOGLE_SCRIPT_URL || "";
	var btn = form.querySelector("button");

	if (!url || url.indexOf("/exec") === -1) {
		status.className = "gate-status gate-status--error";
		status.innerHTML =
			"Falta conectar Gmail. Abre <a href='setup.html'>setup.html</a>.";
		btn.disabled = true;
		return;
	}

	form.addEventListener("submit", function (event) {
		event.preventDefault();

		var email = input.value.trim().toLowerCase();

		if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
			status.className = "gate-status gate-status--error";
			status.textContent = "Escribe un correo valido.";
			return;
		}

		btn.disabled = true;
		btn.textContent = "Enviando…";
		status.className = "gate-status";
		status.textContent = "";

		var body = new URLSearchParams();
		body.append("email", email);

		var done = false;

		function irEnviado() {
			if (done) {
				return;
			}
			done = true;
			window.location.href = ENVIADO_URL;
		}

		fetch(url, {
			method: "POST",
			mode: "no-cors",
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
			body: body.toString()
		})
			.then(irEnviado)
			.catch(irEnviado);

		setTimeout(irEnviado, 3500);
	});
})();
</script>

</body>
</html>
